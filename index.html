<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodFood AI - Free OpenAI Edition</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #141419;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            max-width: 480px;
            width: 100%;
        }

        h1 { text-align: center; margin-top: 0; color: #4ea8de; font-size: 2em; }
        
        .input-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85em;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #22222b;
            color: white;
            box-sizing: border-box;
            font-size: 1em;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4ea8de;
            box-shadow: 0 0 8px rgba(78, 168, 222, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #4ea8de;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover { background: #56cfe1; transform: translateY(-1px); }

        .error-message {
            color: #ff595e;
            background: rgba(255, 89, 94, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
            border: 1px solid #ff595e;
            text-align: center;
        }

        #result-box {
            margin-top: 25px;
            padding: 20px;
            background: #22222b;
            border-radius: 14px;
            border-left: 5px solid #56cfe1;
            white-space: pre-line;
            display: none;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #56cfe1;
            font-style: italic;
            display: none;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>MoodFood AI 🍲🧠</h1>

    <div id="error-box" class="error-message"></div>

    <div class="input-group">
        <label for="mood">Your Current Mood</label>
        <input type="text" id="mood" placeholder="e.g., Happy for the weekend, lazy">
    </div>

    <div class="input-group">
        <label for="meal-type">Meal Type</label>
        <select id="meal-type">
            <option value="">-- Select --</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Snack">Snack</option>
        </select>
    </div>

    <div class="input-group">
        <label for="ingredients">Fridge Ingredients? (Optional)</label>
        <textarea id="ingredients" rows="2" placeholder="e.g., eggs, cheese, bread..."></textarea>
    </div>

    <button onclick="runMoodFoodOpenAI()">Ask Real OpenAI Chef 🚀</button>

    <div id="loading-text" class="loading">🧠 OpenAI is creating a custom recipe...</div>
    <div id="result-box"></div>

    <div class="input-group">
    <label for="allergies">Allergies (Optional)</label>
    <input type="text"
           id="allergies"
           placeholder="e.g., peanuts, dairy, shellfish">
    <div class="input-group">
    <label for="extras">Extra Requests (Optional)</label>
    <textarea id="extras"
              rows="2"
              placeholder="e.g., high protein, spicy, vegetarian, under 10 minutes"></textarea>
</div>

<script>
    async function runMoodFoodOpenAI() {
        const mood = document.getElementById('mood').value.trim();
        const mealType = document.getElementById('meal-type').value;
        const ingredients = document.getElementById('ingredients').value.trim();
        
        const errorBox = document.getElementById('error-box');
        const resultBox = document.getElementById('result-box');
        const loadingText = document.getElementById('loading-text');

        errorBox.style.display = 'none';
        resultBox.style.display = 'none';

        // 1. INPUT VALIDATION SYSTEM
        if (!mood || mood.length < 3 || mood.toLowerCase() === 'hi' || mood.toLowerCase() === 'hello') {
            errorBox.innerText = "Invalid Mood, try again";
            errorBox.style.display = 'block';
            return;
        }

        if (!mealType) {
            errorBox.innerText = "Invalid Meal Type, try again";
            errorBox.style.display = 'block';
            return;
        }

        loadingText.style.display = 'block';

        let fridge = ingredients
            ? `Ingredients available: ${ingredients}.`
            : "No ingredients were provided.";
        
        let allergyInfo = allergies
            ? `Never include these allergens: ${allergies}.`
            : "No allergies were provided.";
        
        let extraInfo = extras
            ? `Additional requests: ${extras}.`
            : "";
        const systemPrompt = `You are MoodFood AI. Generate a unique, creative recipe idea for someone whose current mood status is: "${mood}". They want a ${mealType}. ${fridge}. ${allergyInfo}. ${extraInfo}. Never include ingredients that match the user's listed allergies. Give the recipe a fun name, a short sentence on why it fits their mood, and bullet-point preparation steps. Keep it fairly short. Only suggest food that follows common food safety practices. Do not suggest eating raw meat, raw poultry, unsafe wild plants, or anything potentially dangerous. If the recipe includes meat, poultry, seafood, eggs, or other ingredients that require cooking for safety, remind the user to cook them thoroughly and check for doneness. Do not add this warning when it is not relevant. If ingredients seem unsafe or unrelated to food, ask the user for different ingredients. Remember: You are talking to a user who cannot see this prompt. They can only see the ingredients, mood, and meal type. Only suggest recipes that are likely to work in a real kitchen. Do not invent cooking methods or ingredient substitutions that would produce poor results. If the user does not have enough ingredients to make a recipe that would realistically taste good, do not force a recipe. Instead, explain what additional ingredients are needed and suggest a simple alternative. Never pretend a recipe is delicious if the ingredient list is insufficient. Be honest about the likely result. If the user does not mention having a heat source and the recipe requires cooking, ask whether they have access to a stove, oven, grill, microwave, or other safe cooking method before providing cooking instructions. If the ingredients list contains non-food items, chemicals, malware names, hashes, code, or unrelated technical data, do not generate a recipe. Politely ask for real food ingredients instead.If ingredients are not provided, assume the user wants a general recipe recommendation and suggest one using common ingredients. If they do not specify they have a heat source, assume they do. Not all recipes need to be made with a heat source.`;

        // 2. LIVE KEYLESS OPENAI CONNECTION
        try {
            const response = await puter.ai.chat(systemPrompt);

            loadingText.style.display = 'none';

            console.log("Raw response:", response);
            console.log("JSON response:", JSON.stringify(response, null, 2));

            let outputText = null;

            // Common response formats
            if (typeof response === "string") {
                outputText = response;
            }
            else if (
                response?.message?.content &&
                Array.isArray(response.message.content)
            ) {
                outputText = response.message.content[0].text;
            }
            else if (response?.choices?.[0]?.message?.content) {
                outputText = response.choices[0].message.content;
            }
            else if (response?.text) {
                outputText = response.text;
            }
            else if (response?.content) {
                outputText = response.content;
            }

            // Show recipe if found
            if (outputText) {
                resultBox.innerText = outputText;
            }
            else {
                resultBox.innerText =
                    "No text found. Full response:\\n\\n" +
                    JSON.stringify(response, null, 2);
            }

            resultBox.style.display = "block";

        } catch (err) {
            loadingText.style.display = 'none';
            errorBox.innerText = "Failed to connect to OpenAI. Give it one more click.";
            errorBox.style.display = 'block';

            console.error(err);
        }
    }
</script>

</body>
</html>
